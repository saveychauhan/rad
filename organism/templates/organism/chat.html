<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAD | Neural Dashboard</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Markdown & Syntax Highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(20, 20, 20, 0.7);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --purple: #bc00ff;
            --text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at top right, #1a0033 0%, #050505 50%);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px;
            height: 100vh;
            gap: 1px;
            background: var(--border);
        }

        /* --- CHAT SECTION --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            background: var(--bg);
            height: 100vh; /* Pin to screen height */
            overflow: hidden;
        }

        .header {
            padding: 15px 30px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        #status-indicator {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }

        #chat-window {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            scroll-behavior: smooth;
            word-wrap: break-word;
        }

        .message {
            margin-bottom: 30px;
            max-width: 85%;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            margin-left: auto;
            text-align: right;
        }

        .message-content {
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
        }

        .rad-message .message-content {
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            backdrop-filter: blur(5px);
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 1px solid var(--border);
            display: inline-block;
        }

        /* --- MARKDOWN STYLING --- */
        .message-content h1, .message-content h2 { color: var(--accent); margin: 15px 0 10px; font-size: 1.2em; }
        .message-content code { font-family: 'Fira Code', monospace; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        .message-content pre { margin: 15px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .message-content ul, .message-content ol { padding-left: 20px; margin: 10px 0; }

        /* --- INPUT AREA --- */
        .input-area {
            padding: 20px 30px;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            transition: border 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        #user-input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }

        /* --- SIDEBAR (MISSION CONTROL) --- */
        .sidebar {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .sidebar-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--purple);
            margin-bottom: 25px;
            font-weight: 600;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            border-color: var(--purple);
            transform: translateX(5px);
        }

        .task-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #888;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 9px;
            text-transform: uppercase;
        }

        .badge-high { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid #ff4444; }
        .badge-medium { background: rgba(255, 187, 51, 0.1); color: #ffbb33; border: 1px solid #ffbb33; }
        .badge-done { background: rgba(0, 200, 81, 0.1); color: #00c851; border: 1px solid #00c851; }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- MAIN CHAT -->
    <div class="chat-container">
        <div class="header">
            <div class="logo">RAD</div>
            <div id="status-indicator">
                <div class="pulse"></div>
                <span id="status-text">NEURAL LINK ACTIVE</span>
            </div>
        </div>

        <div id="chat-window">
            {% for msg in history %}
            <div class="message {{ msg.role }}-message">
                <div class="message-content">{{ msg.content }}</div>
            </div>
            {% endfor %}
            <div id="typing-indicator" style="display: none; margin-left: 40px; color: var(--accent); font-size: 12px; font-family: 'Fira Code';">
                Rad is thinking...
            </div>
        </div>

        <div class="input-area">
            <form id="chat-form">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Initiate thought transfer..." autocomplete="off">
                </div>
            </form>
        </div>
    </div>

    <!-- MISSION CONTROL SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-title">Mission Control</div>
        <div id="task-list" class="task-list">
            <!-- Tasks injected here -->
        </div>

        <div class="sidebar-title" style="margin-top: 40px; color: var(--accent);">Neural Shift</div>
        <select id="model-selector" style="background: #111; color: var(--accent); border: 1px solid var(--accent); padding: 12px; border-radius: 8px; font-size: 11px; outline: none; width: 100%; box-shadow: 0 0 10px var(--accent-glow);">
            <!-- Models injected here -->
        </select>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const taskList = document.getElementById('task-list');
    const statusText = document.getElementById('status-text');
    const typingIndicator = document.getElementById('typing-indicator');
    const modelSelector = document.getElementById('model-selector');

    let chatSocket = null;
    let activeMessageDiv = null;
    let activeContent = "";

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        chatSocket = new WebSocket(`${protocol}//${window.location.host}/ws/rad/`);

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            if (data.type === 'status') {
                statusText.innerText = data.content.toUpperCase();
                typingIndicator.style.display = data.content.includes('thinking') ? 'block' : 'none';
            } else if (data.type === 'chunk') {
                typingIndicator.style.display = 'none';
                if (!activeMessageDiv) {
                    activeMessageDiv = createMessageDiv('rad');
                }
                activeContent += data.content;
                const contentDiv = activeMessageDiv.querySelector('.message-content');
                contentDiv.innerHTML = parseMarkdown(activeContent);
                Prism.highlightAllUnder(contentDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } else if (data.type === 'message_complete') {
                activeMessageDiv = null;
                activeContent = "";
                loadTasks();
            } else if (data.type === 'rad_broadcast') {
                appendMessage('rad', data.content);
                loadTasks();
            } else if (data.type === 'task_update_event') {
                loadTasks();
            } else if (data.type === 'brain_shift') {
                modelSelector.value = data.model;
            }
        };

        chatSocket.onclose = function(e) {
            statusText.innerText = "LINK LOST. RECONNECTING...";
            setTimeout(connect, 2000);
        };
    }

    function parseMarkdown(content) {
        try {
            return marked.parse(content);
        } catch (e) {
            console.error("Markdown parse error", e);
            return content.replace(/\n/g, '<br>'); // Simple fallback
        }
    }

    function createMessageDiv(role) {
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        div.appendChild(contentDiv);
        chatWindow.appendChild(div);
        return div;
    }

    function appendMessage(role, content) {
        const div = createMessageDiv(role);
        div.querySelector('.message-content').innerHTML = parseMarkdown(content);
        Prism.highlightAllUnder(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    chatForm.onsubmit = (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;
        appendMessage('user', text);
        chatSocket.send(JSON.stringify({ 'message': text }));
        userInput.value = '';
    };

    async function loadTasks() {
        try {
            const resp = await fetch('/get_tasks/');
            const data = await resp.json();
            if (data.tasks) {
                taskList.innerHTML = data.tasks.map(t => `
                    <div class="task-card">
                        <div class="task-title">${t.title}</div>
                        <div class="task-meta">
                            <span class="badge badge-${t.priority}">${t.priority}</span>
                            <span class="badge badge-${t.status}">${t.status}</span>
                        </div>
                    </div>
                `).join('');
            }
        } catch (e) { console.error("Task load failed", e); }
    }

    async function loadModels() {
        try {
            const resp = await fetch('/get_models/');
            const data = await resp.json();
            if (data.models) {
                modelSelector.innerHTML = data.models.map(m => `
                    <option value="${m.id}" ${m.id === data.current ? 'selected' : ''}>
                        ${m.id.toUpperCase()} (${m.cost}P)
                    </option>
                `).join('');
            }
        } catch (e) { console.error("Model load failed", e); }
    }

    modelSelector.onchange = async () => {
        await fetch('/set_model/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({model: modelSelector.value})
        });
    };

    // Initial load
    document.querySelectorAll('.message-content').forEach(el => {
        el.innerHTML = parseMarkdown(el.textContent || el.innerText);
        Prism.highlightAllUnder(el);
    });

    connect();
    loadTasks();
    loadModels();
</script>

</body>
</html>
