<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAD | Neural Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        :root {
            --void: #020204;
            --panel: rgba(12, 12, 18, 0.65);
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #00f0ff;
            --accent-dim: rgba(0, 240, 255, 0.12);
            --accent-glow: rgba(0, 240, 255, 0.4);
            --purple: #bd00ff;
            --purple-dim: rgba(189, 0, 255, 0.12);
            --success: #00ff9d;
            --warning: #ffd700;
            --danger: #ff2a6d;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.07);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Fira Code', 'SF Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void);
            color: var(--text);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- AMBIENT BACKDROP --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 25%, rgba(0, 240, 255, 0.035) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(189, 0, 255, 0.035) 0%, transparent 45%),
                linear-gradient(rgba(0, 240, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 340px;
            height: 100vh;
            position: relative;
            z-index: 1;
            background: var(--void);
        }

        /* --- CHAT SECTION --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 16px 32px;
            background: linear-gradient(180deg, rgba(5,5,8,0.95) 0%, rgba(5,5,8,0.4) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border: 1.5px solid var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            box-shadow: 0 0 15px var(--accent-dim);
            position: relative;
            overflow: hidden;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, var(--accent-dim) 100%);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--text);
        }

        .logo-sub {
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--text-dim);
            font-family: var(--font-mono);
            margin-top: 2px;
        }

        #status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1.5px;
            color: var(--accent);
            transition: all 0.3s ease;
        }

        .pulse {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-glow);
            animation: pulse-animation 2.5s infinite ease-in-out;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.9); opacity: 1; box-shadow: 0 0 8px var(--accent-glow); }
            50% { transform: scale(1.3); opacity: 0.6; box-shadow: 0 0 20px var(--accent-glow); }
            100% { transform: scale(0.9); opacity: 1; box-shadow: 0 0 8px var(--accent-glow); }
        }

        #chat-window {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- MESSAGES --- */
        .message {
            max-width: 82%;
        }
        .msg-animate {
            animation: msgEnter 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes msgEnter {
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            margin-left: auto;
        }

        .rad-message {
            align-self: flex-start;
            margin-right: auto;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: 14px;
            line-height: 1.65;
            font-size: 14.5px;
            word-wrap: break-word;
        }

        .rad-message .message-content {
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 2.5px solid var(--accent);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .user-message .message-content {
            background: linear-gradient(145deg, #16161f, #1e1e2a);
            border: 1px solid var(--border);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* System / Tool messages */
        .system-message {
            align-self: center;
            max-width: 90%;
        }
        .system-message .message-content {
            background: rgba(255, 215, 0, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: var(--warning);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 10px 16px;
            border-radius: 8px;
        }

        .tool-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-dim);
            border: 1px solid rgba(0, 240, 255, 0.25);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 6px;
            margin: 4px 0;
            animation: chipPop 0.25s ease;
        }
        .tool-chip::before { content: '⚡'; font-size: 10px; }
        @keyframes chipPop { from { opacity:0; transform:scale(0.9)} to { opacity:1; transform:scale(1)} }

        /* --- MARKDOWN STYLING --- */
        .message-content h1, .message-content h2 {
            color: var(--accent);
            margin: 18px 0 10px;
            font-size: 1.15em;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .message-content h3 { color: var(--text); font-size: 1.05em; margin: 14px 0 8px; }
        .message-content p { margin-bottom: 10px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content code {
            font-family: var(--font-mono);
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--accent);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .message-content pre {
            margin: 16px 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0c0c14 !important;
        }
        .message-content pre code {
            background: transparent;
            border: none;
            color: var(--text);
            padding: 16px;
            display: block;
            overflow-x: auto;
        }
        .message-content ul, .message-content ol {
            padding-left: 22px;
            margin: 10px 0;
        }
        .message-content li { margin-bottom: 4px; }
        .message-content blockquote {
            border-left: 3px solid var(--purple);
            padding-left: 14px;
            margin: 12px 0;
            color: var(--text-dim);
            font-style: italic;
        }
        .message-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 18px 0;
        }
        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            font-size: 13px;
        }
        .message-content th, .message-content td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        .message-content th {
            background: rgba(255,255,255,0.03);
            font-weight: 600;
            color: var(--accent);
        }

        /* --- INPUT AREA --- */
        .input-area {
            padding: 20px 32px 28px;
            background: linear-gradient(0deg, rgba(2,2,4,0.98) 0%, rgba(2,2,4,0.6) 100%);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(16px);
            flex-shrink: 0;
            z-index: 10;
        }

        .input-wrapper {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 8px 32px rgba(0,0,0,0.4);
        }

        #user-input {
            background: transparent;
            border: none;
            color: var(--text);
            flex: 1;
            font-size: 15px;
            outline: none;
            padding: 14px 18px;
            font-family: var(--font-main);
        }
        #user-input::placeholder { color: var(--text-dim); opacity: 0.6; }

        .send-btn {
            background: linear-gradient(135deg, var(--accent), #00c8ff);
            color: #000;
            border: none;
            border-radius: 12px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 18px;
            margin-right: 4px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 16px var(--accent-dim);
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 24px var(--accent-glow);
        }
        .send-btn:active { transform: scale(0.95); }

        /* --- TYPING INDICATOR --- */
        #typing-indicator {
            display: none;
            align-self: flex-start;
            margin: 8px 0 8px 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent);
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 10px;
            backdrop-filter: blur(8px);
            animation: msgEnter 0.3s ease;
        }
        .typing-dots { display: inline-flex; gap: 4px; margin-left: 8px; }
        .typing-dots span {
            width: 4px; height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .sidebar {
            background: linear-gradient(180deg, rgba(8,8,14,0.95) 0%, rgba(5,5,8,0.9) 100%);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .token-badge {
            font-size: 10px;
            color: var(--accent);
            opacity: 0.6;
            margin-top: 8px;
            font-family: var(--font-mono);
            text-align: right;
            padding-right: 4px;
        }
        .sidebar-content {
            padding: 28px;
            gap: 28px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex: 1;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sidebar-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3.5px;
            color: var(--text-dim);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-title::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .sidebar-title.purple::before { background: var(--purple); box-shadow: 0 0 8px var(--purple); }

        .task-list { display: flex; flex-direction: column; gap: 10px; }

        .task-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 10px;
            transition: all 0.25s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .task-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2.5px;
            background: var(--text-dim);
            border-radius: 10px 0 0 10px;
        }
        .task-card:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateX(4px);
            background: rgba(255,255,255,0.05);
        }
        .task-card[data-priority="high"]::before { background: var(--danger); }
        .task-card[data-priority="medium"]::before { background: var(--warning); }
        .task-card[data-status="done"]::before { background: var(--success); }

        .task-title {
            font-size: 12.5px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            padding-left: 8px;
        }
        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 8px;
        }
        .badge {
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 9.5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            font-family: var(--font-mono);
            border: 1px solid transparent;
        }
        .badge-high { background: rgba(255, 42, 109, 0.1); color: var(--danger); border-color: rgba(255, 42, 109, 0.25); }
        .badge-medium { background: rgba(255, 215, 0, 0.08); color: var(--warning); border-color: rgba(255, 215, 0, 0.2); }
        .badge-low { background: rgba(148, 163, 184, 0.08); color: var(--text-dim); border-color: rgba(148, 163, 184, 0.2); }
        .badge-todo { background: rgba(148, 163, 184, 0.06); color: var(--text-dim); border-color: var(--border); }
        .badge-doing { background: rgba(0, 240, 255, 0.08); color: var(--accent); border-color: rgba(0, 240, 255, 0.25); }
        .badge-done { background: rgba(0, 255, 157, 0.08); color: var(--success); border-color: rgba(0, 255, 157, 0.25); }

        .model-selector-wrap {
            position: relative;
        }
        #model-selector {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-family: var(--font-mono);
            outline: none;
            cursor: pointer;
            appearance: none;
            transition: all 0.2s;
        }
        #model-selector:hover { border-color: var(--accent-dim); }
        #model-selector:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .model-selector-wrap::after {
            content: '▼';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 9px;
            pointer-events: none;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-pill {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            font-family: var(--font-mono);
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- MAIN CHAT -->
    <div class="chat-container">
        <div class="header">
            <div class="logo-wrap">
                <div class="logo-icon">R</div>
                <div>
                    <div class="logo-text">RAD</div>
                    <div class="logo-sub">NEURAL LINK v2.0</div>
                </div>
            </div>
            <div id="status-indicator">
                <div class="pulse"></div>
                <span id="status-text">ONLINE</span>
            </div>
        </div>

        <div id="chat-window">
            {% for msg in history %}
            <div class="message {{ msg.role }}-message">
                <div class="message-content">{{ msg.content }}</div>
            </div>
            {% endfor %}
            <div id="typing-indicator">
                Processing
                <span class="typing-dots"><span></span><span></span><span></span></span>
            </div>
        </div>

        <div class="input-area">
            <form id="chat-form">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Initiate thought transfer..." autocomplete="off">
                    <button type="submit" class="send-btn">→</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MISSION CONTROL SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-section">
                <div class="sidebar-title">Mission Control</div>
                <div id="task-list" class="task-list">
                    <!-- Tasks will be injected here -->
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title purple">Neural Shift</div>
                <div class="model-selector-wrap">
                <select id="model-selector">
                    <option value="kimi">KIMI (High Tier)</option>
                    <option value="mistral">MISTRAL (Balanced)</option>
                    <option value="qwen">QWEN (Swift)</option>
                    <option value="anonymous">ANONYMOUS (Survival)</option>
                </select>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">System Status</div>
            <div class="stats-row">
                <div class="stat-pill">
                    <div class="stat-label">Pollen</div>
                    <div class="stat-value" id="pollen-stat">0.4/hr</div>
                </div>
                <div class="stat-pill">
                    <div class="stat-label">Model</div>
                    <div class="stat-value" id="model-stat">KIMI</div>
                </div>
            </div>
            </div>
        </div>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const taskList = document.getElementById('task-list');
    const statusText = document.getElementById('status-text');
    const typingIndicator = document.getElementById('typing-indicator');
    const modelSelector = document.getElementById('model-selector');
    const modelStat = document.getElementById('model-stat');

    let chatSocket = null;
    let activeMessageDiv = null;
    let activeContent = "";

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        chatSocket = new WebSocket(`${protocol}//${window.location.host}/ws/rad/`);

        chatSocket.onopen = () => {
            statusText.innerText = "ONLINE";
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            if (data.type === 'status') {
                const isThinking = data.content.toLowerCase().includes('thinking');
                statusText.innerText = isThinking ? "SYNTHESIZING" : "ONLINE";
                typingIndicator.style.display = isThinking ? 'flex' : 'none';
            } else if (data.type === 'chunk') {
                typingIndicator.style.display = 'none';
                if (!activeMessageDiv) {
                    activeMessageDiv = createMessageDiv('rad');
                }
                activeContent += data.content;
                const contentDiv = activeMessageDiv.querySelector('.message-content');
                contentDiv.innerHTML = parseMarkdown(activeContent);
                Prism.highlightAllUnder(contentDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } else if (data.type === 'message_complete') {
                if (activeMessageDiv && data.cost) {
                    const badge = document.createElement('div');
                    badge.className = 'token-badge';
                    badge.innerHTML = `⚡ ${data.cost.toFixed(3)} P`;
                    activeMessageDiv.appendChild(badge);
                }
                activeMessageDiv = null;
                activeContent = "";
                loadTasks();
            } else if (data.type === 'rad_broadcast') {
                appendMessage('rad', data.content);
                loadTasks();
            } else if (data.type === 'task_update_event') {
                loadTasks();
            } else if (data.type === 'brain_shift') {
                modelSelector.value = data.model;
                if (modelStat) modelStat.innerText = data.model.toUpperCase();
            } else if (data.type === 'force_refresh') {
                console.log("[SYSTEM] Hot reload triggered...");
                window.location.reload();
            }
        };

        chatSocket.onclose = function(e) {
            statusText.innerText = "LINK LOST";
            setTimeout(connect, 2000);
        };

        chatSocket.onerror = function(e) {
            statusText.innerText = "SIGNAL ERROR";
        };
    }

    function parseMarkdown(content) {
        try {
            return marked.parse(content);
        } catch (e) {
            console.error("Markdown parse error", e);
            return content.replace(/\n/g, '<br>');
        }
    }

    function createMessageDiv(role) {
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        div.appendChild(contentDiv);
        chatWindow.appendChild(div);
        return div;
    }

    function appendMessage(role, content) {
        // Detect system/tool messages inline
        if (content.startsWith('[SYSTEM]:') || content.startsWith('Tool [')) {
            const div = createMessageDiv('system');
            div.querySelector('.message-content').textContent = content;
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return;
        }

        const div = createMessageDiv(role);
        div.querySelector('.message-content').innerHTML = parseMarkdown(content);
        Prism.highlightAllUnder(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    chatForm.onsubmit = (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;
        appendMessage('user', text);
        chatSocket.send(JSON.stringify({ 'message': text }));
        userInput.value = '';
    };

    async function loadTasks() {
        try {
            const resp = await fetch('/get_tasks/');
            const data = await resp.json();
            if (data.tasks && data.tasks.length > 0) {
                taskList.innerHTML = data.tasks.map(t => `
                    <div class="task-card" data-priority="${t.priority}" data-status="${t.status}">
                        <div class="task-title">${t.title}</div>
                        <div class="task-meta">
                            <span class="badge badge-${t.priority}">${t.priority}</span>
                            <span class="badge badge-${t.status}">${t.status}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                taskList.innerHTML = `
                    <div class="task-card" data-priority="low" data-status="todo">
                        <div class="task-title" style="color:var(--text-dim)">No active missions</div>
                    </div>
                `;
            }
        } catch (e) { console.error("Task load failed", e); }
    }

    async function loadModels() {
        try {
            const resp = await fetch('/get_models/');
            const data = await resp.json();
            if (data.models) {
                modelSelector.innerHTML = data.models.map(m => `
                    <option value="${m.id}" ${m.id === data.current ? 'selected' : ''}>
                        ${m.id.toUpperCase()} ${m.cost ? '('+m.cost+'P)' : ''}
                    </option>
                `).join('');
                if (data.current) modelStat.innerText = data.current.toUpperCase();
            }
        } catch (e) { console.error("Model load failed", e); }
    }

    modelSelector.onchange = async () => {
        const val = modelSelector.value;
        modelStat.innerText = val.toUpperCase();
        await fetch('/set_model/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({model: val})
        });
    };

    // Initial load: parse any server-rendered markdown
    document.querySelectorAll('.message-content').forEach(el => {
        const raw = el.textContent || el.innerText;
        el.innerHTML = parseMarkdown(raw);
        Prism.highlightAllUnder(el);
    });

    connect();
    loadTasks();
    loadModels();
</script>

</body>
</html>
